name: B2B — Validate skill from plugin repo

on:
  repository_dispatch:
    types: [b2b-validate]
  workflow_dispatch:
    inputs:
      skills_repo_ref:
        description: 'Branch in commercetools-demo/commercetools-plugin to test'
        required: true
        default: 'main'
      skills_repo_sha:
        description: 'Commit SHA (optional — for check run attachment)'
        required: false
      extra_instructions:
        description: 'Additional instructions for Claude (same as [harness] block in commit message)'
        required: false
        default: ''

concurrency:
  group: b2b-validate-${{ github.event.client_payload.skills_repo_ref || inputs.skills_repo_ref }}
  cancel-in-progress: true

jobs:
  scaffold-and-test:
    uses: ./.github/workflows/_scaffold-and-test.yml
    with:
      skill_name: commercetools-b2b-storefront
      skill_slug: b2b
      skills_repo_ref: ${{ github.event.client_payload.skills_repo_ref || inputs.skills_repo_ref }}
      skills_repo_sha: ${{ github.event.client_payload.skills_repo_sha || inputs.skills_repo_sha || '' }}
      extra_instructions: ${{ github.event.client_payload.extra_instructions || inputs.extra_instructions || '' }}
      source_repo: commercetools-demo/commercetools-plugin
      publish: false
      deploy: true
    secrets: inherit

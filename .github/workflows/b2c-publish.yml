name: B2C — Publish from plugin repo to generated-storefronts

on:
  repository_dispatch:
    types: [b2c-publish]
  workflow_dispatch:
    inputs:
      skills_repo_ref:
        description: 'Branch in commercetools-demo/commercetools-plugin (use main)'
        required: true
        default: 'main'

concurrency:
  group: b2c-publish
  cancel-in-progress: false

jobs:
  scaffold-and-publish:
    uses: ./.github/workflows/_scaffold-and-test.yml
    with:
      skill_name: commercetools-b2c-storefront
      skill_slug: b2c
      skills_repo_ref: ${{ github.event.client_payload.skills_repo_ref || inputs.skills_repo_ref }}
      skills_repo_sha: ${{ github.event.client_payload.skills_repo_sha || '' }}
      extra_instructions: ${{ github.event.client_payload.extra_instructions || '' }}
      source_repo: commercetools-demo/commercetools-plugin
      publish: true
      deploy: false
    secrets: inherit

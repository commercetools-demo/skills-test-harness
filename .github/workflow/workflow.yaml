name: Scaffold and test storefront
on:
  push:
    branches-ignore: [main]
  workflow_dispatch:

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install skill locally
        run: |
          mkdir -p .claude/skills
          cp -r skill/commercetools-b2c-storefront .claude/skills/

      - name: Run Claude Code with scaffold prompt
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: prompts/scaffold-b2c.md
          # Tell Claude to write output to generated/
          allowed_tools: "Write,Edit,Bash"

      - name: Commit generated code
        run: |
          git config user.name "skill-test-bot"
          git add generated/
          git commit -m "scaffold: $(date -u +%Y%m%dT%H%M%SZ) from ${{ github.sha }}"
          git push

      # Netlify auto-deploys this branch (configured in step 3)

      - name: Wait for Netlify deploy
        run: ./scripts/wait-for-netlify.sh "$GITHUB_REF_NAME"

      - name: Run E2E tests against preview URL
        run: npx playwright test
        env:
          BASE_URL: https://${{ github.ref_name }}--your-site.netlify.app

      - name: LLM-as-judge production-readiness check
        run: node scripts/grade-readiness.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PREVIEW_URL: https://${{ github.ref_name }}--your-site.netlify.app